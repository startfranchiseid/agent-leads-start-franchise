<!-- JAVASCRIPT (REST API — Render Backend)                        -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<script defer>
    (function () {
        'use strict';

        var API = window.SF_API_BASE || '';
        var SLUG = window.location.pathname.replace('/article/', '').replace(/\/$/, '');
        if (!window.location.pathname.startsWith('/article/') || SLUG === '') return;

        // ═════════════════════════════════════════
        // REST API HELPERS
        // ═════════════════════════════════════════
        function apiGet(url) {
            return fetch(API + url).then(function (r) { return r.json() });
        }
        function apiPost(url, data) {
            return fetch(API + url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(function (r) { return r.json() });
        }

        // ═════════════════════════════════════════
        // HELPERS
        // ═════════════════════════════════════════
        function getFP() {
            var fp = localStorage.getItem('sf_fp');
            if (!fp) { fp = 'fp_' + Math.random().toString(36).substr(2, 12) + Date.now(); localStorage.setItem('sf_fp', fp) }
            return fp;
        }
        function timeAgo(d) {
            var s = Math.floor((Date.now() - new Date(d)) / 1000);
            if (s < 60) return 'baru saja'; if (s < 3600) return Math.floor(s / 60) + ' menit lalu';
            if (s < 86400) return Math.floor(s / 3600) + ' jam lalu'; return Math.floor(s / 86400) + ' hari lalu';
        }
        function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML }

        // ═════════════════════════════════════════
        // INIT
        // ═════════════════════════════════════════
        function init() {
            var body = document.querySelector('.blog-item-content-wrapper')
                || document.querySelector('.entry-content')
                || document.querySelector('article')
                || document.querySelector('.blog-item-wrapper');
            if (!body) return setTimeout(init, 500);
            buildTOC(body); buildChat(body); buildRecs(body); buildComments(body);
        }

        // ═════════════════════════════════════════
        // 1. DAFTAR ISI (TOC SIDEBAR)
        // ═════════════════════════════════════════
        function buildTOC(articleBody) {
            var content = document.querySelector('.blog-item-content') || articleBody;
            var headings = content.querySelectorAll('h1,h2,h3');
            if (headings.length < 2) return;
            var titleEl = document.querySelector('.blog-item-title h1, .entry-title, h1.blog-title');
            var titleText = titleEl ? titleEl.textContent.trim() : document.title;
            var parent = articleBody.parentElement;
            var wrap = document.createElement('div'); wrap.className = 'sf-enhanced-layout';
            parent.insertBefore(wrap, articleBody);
            var sidebar = document.createElement('aside'); sidebar.className = 'sf-toc-sidebar';
            var main = document.createElement('div'); main.className = 'sf-article-main';
            main.appendChild(articleBody); wrap.appendChild(sidebar); wrap.appendChild(main);
            sidebar.innerHTML =
                '<a href="/article" class="sf-toc-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Kembali</a>' +
                '<div class="sf-toc-label">Daftar Isi</div>' +
                '<div class="sf-toc-title" id="sf-toc-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg><span>' + titleText.substring(0, 80) + '</span></div>' +
                '<input type="text" class="sf-toc-search" placeholder="Cari bab..." id="sf-toc-search">' +
                '<ul class="sf-toc-list" id="sf-toc-list"></ul>';
            var list = sidebar.querySelector('#sf-toc-list');
            var search = sidebar.querySelector('#sf-toc-search');
            headings.forEach(function (h, i) {
                if (!h.id) h.id = 'sf-h-' + i;
                var li = document.createElement('li');
                li.className = 'sf-toc-item' + (h.tagName === 'H3' ? ' sf-toc-h3' : '');
                li.textContent = h.textContent.trim(); li.setAttribute('data-target', h.id);
                li.addEventListener('click', function () { document.getElementById(h.id).scrollIntoView({ behavior: 'smooth', block: 'start' }) });
                list.appendChild(li);
            });
            search.addEventListener('input', function () {
                var q = this.value.toLowerCase();
                list.querySelectorAll('.sf-toc-item').forEach(function (li) { li.style.display = li.textContent.toLowerCase().includes(q) ? '' : 'none' });
            });
            var items = list.querySelectorAll('.sf-toc-item');
            var obs = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) {
                        items.forEach(function (li) { li.classList.remove('active') });
                        var a = list.querySelector('[data-target="' + e.target.id + '"]'); if (a) a.classList.add('active')
                    }
                });
            }, { rootMargin: '-100px 0px -70% 0px' });
            headings.forEach(function (h) { obs.observe(h) });
            document.getElementById('sf-toc-top').addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }) });
        }

        // ═════════════════════════════════════════
        // 2. AI CHATBOT
        // ═════════════════════════════════════════
        function buildChat(articleBody) {
            var artText = (articleBody.innerText || articleBody.textContent || '').substring(0, 15000);
            var artTitle = (document.querySelector('h1') || {}).textContent || document.title;
            var fab = document.createElement('button'); fab.className = 'sf-chat-fab';
            fab.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
            fab.title = 'Tanya AI tentang artikel ini'; document.body.appendChild(fab);
            var panel = document.createElement('div'); panel.className = 'sf-chat-panel';
            panel.innerHTML =
                '<div class="sf-chat-header"><span class="sf-chat-header-title">\uD83E\uDD16 Tanya AI \u2014 Artikel Ini</span><button class="sf-chat-close">\u2715</button></div>' +
                '<div class="sf-chat-messages" id="sf-chat-msgs"><div class="sf-chat-msg bot">Halo! Saya bisa menjawab pertanyaan seputar artikel ini. Silakan bertanya!</div></div>' +
                '<div class="sf-chat-suggestions" id="sf-chat-sugg"><button class="sf-chat-suggest-btn">Ringkasan artikel</button><button class="sf-chat-suggest-btn">Berapa investasinya?</button><button class="sf-chat-suggest-btn">Keuntungan bisnis ini?</button></div>' +
                '<div class="sf-chat-input-area"><input type="text" class="sf-chat-input" id="sf-ci" placeholder="Ketik pertanyaan..."><button class="sf-chat-send" id="sf-cs"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button></div>';
            document.body.appendChild(panel);
            var open = false;
            fab.addEventListener('click', function () { open = !open; panel.classList.toggle('open', open) });
            panel.querySelector('.sf-chat-close').addEventListener('click', function () { open = false; panel.classList.remove('open') });
            panel.querySelectorAll('.sf-chat-suggest-btn').forEach(function (b) { b.addEventListener('click', function () { send(this.textContent) }) });
            var ci = document.getElementById('sf-ci'), cs = document.getElementById('sf-cs');
            cs.addEventListener('click', function () { send(ci.value) });
            ci.addEventListener('keydown', function (e) { if (e.key === 'Enter') send(ci.value) });
            function send(msg) {
                msg = msg.trim(); if (!msg) return; ci.value = '';
                var msgs = document.getElementById('sf-chat-msgs');
                msgs.innerHTML += '<div class="sf-chat-msg user">' + esc(msg) + '</div>';
                msgs.innerHTML += '<div class="sf-chat-msg bot typing" id="sf-typing">Mengetik...</div>';
                msgs.scrollTop = msgs.scrollHeight;
                document.getElementById('sf-chat-sugg').style.display = 'none';
                apiPost('/api/chat', { message: msg, articleContent: artText, articleTitle: artTitle })
                    .then(function (d) {
                        var t = document.getElementById('sf-typing'); if (t) t.remove();
                        msgs.innerHTML += '<div class="sf-chat-msg bot">' + esc(d.reply || d.error || 'Maaf, terjadi kesalahan.') + '</div>';
                        msgs.scrollTop = msgs.scrollHeight;
                    })
                    .catch(function () {
                        var t = document.getElementById('sf-typing'); if (t) t.remove();
                        msgs.innerHTML += '<div class="sf-chat-msg bot">Tidak dapat terhubung ke server.</div>';
                    });
            }
        }

        // ═════════════════════════════════════════
        // 3. ARTIKEL TERKAIT
        // ═════════════════════════════════════════
        function buildRecs(articleBody) {
            var container = document.querySelector('.sf-article-main') || articleBody.parentElement;
            var sec = document.createElement('div'); sec.className = 'sf-recommendations';
            sec.innerHTML = '<h2 class="sf-rec-title">Artikel Terkait</h2><div class="sf-rec-grid" id="sf-rec-grid"><p style="text-align:center;color:#999;grid-column:1/-1">Memuat artikel terkait...</p></div>';
            container.appendChild(sec);
            var grid = sec.querySelector('#sf-rec-grid');

            fetch('/article')
                .then(function (r) { return r.text() })
                .then(function (html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var cards = doc.querySelectorAll('.blog-basic-grid--container');
                    var articles = [];
                    var currentPath = window.location.pathname;

                    cards.forEach(function (card) {
                        var titleEl = card.querySelector('.blog-title a');
                        var imgEl = card.querySelector('.image-wrapper img');
                        var excerptEl = card.querySelector('.blog-excerpt p');
                        var dateEl = card.querySelector('.blog-date');
                        if (!titleEl) return;

                        var href = titleEl.getAttribute('href') || '';
                        if (href === currentPath) return; // skip current article

                        var imgSrc = '';
                        if (imgEl) {
                            imgSrc = imgEl.getAttribute('data-src') || imgEl.getAttribute('src') || '';
                            if (imgSrc && !imgSrc.startsWith('http')) imgSrc = 'https://www.startfranchise.id' + imgSrc;
                        }

                        articles.push({
                            title: titleEl.textContent.trim(),
                            href: href,
                            image: imgSrc,
                            excerpt: excerptEl ? excerptEl.textContent.trim().substring(0, 120) + '...' : '',
                            date: dateEl ? dateEl.textContent.trim() : ''
                        });
                    });

                    articles = articles.slice(0, 6);
                    grid.innerHTML = '';

                    if (articles.length === 0) {
                        grid.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1">Belum ada rekomendasi.</p>';
                        return;
                    }

                    articles.forEach(function (a) {
                        var card = document.createElement('div');
                        card.className = 'sf-rec-card';
                        var imgHtml = a.image
                            ? '<a href="' + a.href + '"><img src="' + a.image + '?format=500w" alt="' + esc(a.title) + '" style="width:100%;height:180px;object-fit:cover;display:block" loading="lazy"></a>'
                            : '<div class="sf-rec-card-img" style="background:linear-gradient(135deg,#667eea,#764ba2)">SF</div>';
                        card.innerHTML = imgHtml +
                            '<div class="sf-rec-card-body">' +
                            '<div class="sf-rec-card-meta">' + (a.date || 'Article') + '</div>' +
                            '<a href="' + a.href + '" class="sf-rec-card-link">' + esc(a.title.substring(0, 80)) + '</a>' +
                            '<p class="sf-rec-card-excerpt">' + esc(a.excerpt) + '</p>' +
                            '</div>';
                        grid.appendChild(card);
                    });
                })
                .catch(function () {
                    grid.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1">Gagal memuat artikel terkait.</p>';
                });
        }

        // ═════════════════════════════════════════
        // 4. KOMENTAR
        // ═════════════════════════════════════════
        function buildComments(articleBody) {
            var container = document.querySelector('.sf-article-main') || articleBody.parentElement;
            var sec = document.createElement('div'); sec.className = 'sf-comments';
            sec.innerHTML = '<h2 class="sf-comments-title">Komentar</h2>' +
                '<div class="sf-comment-form" id="sf-cf"><input type="text" id="sf-cn" placeholder="Nama Anda *"><input type="email" id="sf-ce" placeholder="Email (opsional)"><textarea id="sf-cm" placeholder="Tulis komentar Anda..."></textarea><button id="sf-cb">Kirim Komentar</button></div>' +
                '<div id="sf-cl"></div>';
            container.appendChild(sec);
            var fp = getFP();
            document.getElementById('sf-cb').addEventListener('click', function () {
                var n = document.getElementById('sf-cn').value.trim(), e = document.getElementById('sf-ce').value.trim(), m = document.getElementById('sf-cm').value.trim();
                if (!n || !m) return alert('Nama dan komentar wajib diisi!');
                apiPost('/api/comments', { article_slug: SLUG, name: n, email: e, message: m, fingerprint: fp }).then(function (d) { if (d.error) { alert(d.error); return; } document.getElementById('sf-cm').value = ''; load() }).catch(function () { alert('Gagal mengirim komentar') });
            });
            function load() {
                apiGet('/api/comments?slug=' + encodeURIComponent(SLUG))
                    .then(function (d) { render(d) })
                    .catch(function () { document.getElementById('sf-cl').innerHTML = '<p class="sf-no-comments">Tidak dapat memuat komentar.</p>' });
            }
            function render(comments) {
                var el = document.getElementById('sf-cl');
                if (!comments || comments.length === 0) { el.innerHTML = '<p class="sf-no-comments">Belum ada komentar. Jadilah yang pertama!</p>'; return }
                el.innerHTML = ''; comments.forEach(function (c) { el.appendChild(mkComment(c)) });
            }
            function mkComment(c) {
                var div = document.createElement('div'); div.className = 'sf-comment-item';
                var delHtml = (c.user_fingerprint === fp) ? '<button class="sf-del" data-id="' + c.id + '" style="color:#e74c3c">\uD83D\uDDD1\uFE0F Hapus</button>' : '';
                div.innerHTML = '<div class="sf-comment-header"><span class="sf-comment-name">' + esc(c.name) + '</span><span class="sf-comment-date">' + timeAgo(c.created_at) + '</span></div>' +
                    '<div class="sf-comment-text">' + esc(c.message) + '</div>' +
                    '<div class="sf-comment-actions"><button class="sf-lk" data-id="' + c.id + '">\uD83D\uDC4D <span>' + (c.likes || 0) + '</span></button><button class="sf-dk" data-id="' + c.id + '">\uD83D\uDC4E <span>' + (c.dislikes || 0) + '</span></button><button class="sf-rp" data-id="' + c.id + '">Balas</button>' + delHtml + '</div>';
                div.querySelector('.sf-lk').addEventListener('click', function () { react(c.id, 'like') });
                div.querySelector('.sf-dk').addEventListener('click', function () { react(c.id, 'dislike') });
                div.querySelector('.sf-rp').addEventListener('click', function () { toggleReply(div, c.id) });
                if (c.user_fingerprint === fp) {
                    div.querySelector('.sf-del').addEventListener('click', function () { deleteComment(c.id) });
                }
                if (c.replies && c.replies.length > 0) {
                    var rDiv = document.createElement('div'); rDiv.className = 'sf-replies';
                    c.replies.forEach(function (r) { rDiv.appendChild(mkComment(r)) }); div.appendChild(rDiv)
                }
                return div;
            }
            function toggleReply(el, pid) {
                var ex = el.querySelector('.sf-reply-form'); if (ex) { ex.remove(); return }
                var f = document.createElement('div'); f.className = 'sf-reply-form';
                f.innerHTML = '<input type="text" placeholder="Nama Anda *" class="sf-rn"><textarea placeholder="Tulis balasan..." class="sf-rm"></textarea><div class="sf-reply-form-btns"><button class="sf-btn-submit">Balas</button><button class="sf-btn-cancel">Batal</button></div>';
                f.querySelector('.sf-btn-cancel').addEventListener('click', function () { f.remove() });
                f.querySelector('.sf-btn-submit').addEventListener('click', function () {
                    var n = f.querySelector('.sf-rn').value.trim(), m = f.querySelector('.sf-rm').value.trim(); if (!n || !m) return;
                    apiPost('/api/comments', { article_slug: SLUG, parent_id: pid, name: n, email: '', message: m, fingerprint: fp }).then(function () { load() });
                });
                el.appendChild(f);
            }
            function react(id, type) {
                apiPost('/api/react', { comment_id: id, reaction_type: type, user_fingerprint: fp }).then(function () { load() });
            }
            function deleteComment(id) {
                if (!confirm('Hapus komentar ini?')) return;
                fetch(API + '/api/comments/' + id + '?fingerprint=' + fp, { method: 'DELETE' }).then(function (r) { return r.json() }).then(function (d) { if(d.error) alert(d.error); load() });
            }
            load();
        }

        // BOOT
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
</script>
